<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1A237E 0%, #283593 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #1A237E;
            margin-bottom: 20px;
        }
        .tipo {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tipo button {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tipo .ativo {
            background: #1A237E;
            color: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #00C853;
        }
        small {
            display: block;
            font-size: 11px;
            color: #999;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        button[onclick="cadastrar()"] {
            width: 100%;
            padding: 12px;
            background: #00C853;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button[onclick="cadastrar()"]:hover {
            background: #00A844;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
        }
        .login-link a {
            color: #1A237E;
            text-decoration: none;
        }
        #msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .campo-vendedor {
            display: none;
        }
        .campo-vendedor.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ACEITAÊ - Cadastro</h2>
        
        <div class="tipo">
            <button type="button" id="btnComprador" class="ativo">Comprador</button>
            <button type="button" id="btnVendedor">Vendedor</button>
        </div>
        
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="tel" id="telefone" placeholder="Telefone (11 99999-9999)" required>
        <input type="password" id="senha" placeholder="Senha" required>
        
        <div id="camposVendedor" class="campo-vendedor">
            <input type="text" id="cpf" placeholder="CPF (obrigatório)">
            <input type="text" id="pix" placeholder="Chave PIX">
            <input type="text" id="endereco" placeholder="Endereço completo">
        </div>
        
        <input type="tel" id="whatsapp" placeholder="WhatsApp (com DDD)" required>
        <small>Ex: (11) 99999-9999 - Para receber notificações</small>
        
        <button onclick="cadastrar()">Cadastrar</button>
        
        <div class="login-link">
            <a href="login.html">Já tem conta? Faça login</a>
        </div>
        <div id="msg"></div>
    </div>

    <script>
        const API_URL = 'https://aceitae33-api.onrender.com';

        let tipo = 'comprador';
        
        document.getElementById('btnComprador').onclick = () => {
            tipo = 'comprador';
            document.getElementById('btnComprador').classList.add('ativo');
            document.getElementById('btnVendedor').classList.remove('ativo');
            document.getElementById('camposVendedor').classList.remove('visible');
        };
        
        document.getElementById('btnVendedor').onclick = () => {
            tipo = 'vendedor';
            document.getElementById('btnVendedor').classList.add('ativo');
            document.getElementById('btnComprador').classList.remove('ativo');
            document.getElementById('camposVendedor').classList.add('visible');
        };

        async function cadastrar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const senha = document.getElementById('senha').value;
            const whatsapp = document.getElementById('whatsapp').value;
            
            if (!nome || !email || !telefone || !senha || !whatsapp) {
                document.getElementById('msg').style.color = 'red';
                document.getElementById('msg').innerText = 'Preencha todos os campos obrigatórios!';
                return;
            }
            
            const payload = {
                nome: nome,
                email: email,
                telefone: telefone,
                senha: senha,
                tipo: tipo,
                whatsapp: whatsapp,
                cpf: document.getElementById('cpf').value || null,
                pix: document.getElementById('pix').value || null,
                endereco: document.getElementById('endereco').value || null
            };

            const msg = document.getElementById('msg');

            try {
                const response = await fetch(`${API_URL}/cadastrar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    msg.style.color = 'green';
                    msg.innerText = '✅ Cadastro realizado com sucesso!';
                    setTimeout(() => location.href = 'login.html', 1500);
                } else {
                    msg.style.color = 'red';
                    msg.innerText = data.detail || 'Erro ao cadastrar';
                }
            } catch (error) {
                console.error('Erro:', error);
                msg.style.color = 'red';
                msg.innerText = 'Erro de conexão com o servidor';
            }
        }
    </script>
</body>
</html>
