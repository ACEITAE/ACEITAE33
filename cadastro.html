<!DOCTYPE html>
<html>
<head>
    <title>ACEITAÊ - Cadastro</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { padding: 30px; border: 1px solid #ccc; border-radius: 10px; width: 350px; }
        input, select, button { width: 100%; margin: 10px 0; padding: 8px; }
        button { background: #00C853; color: white; border: none; cursor: pointer; }
        .tipo { display: flex; gap: 10px; }
        .tipo button { background: #ddd; color: black; }
        .tipo .ativo { background: #1A237E; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Cadastro</h2>
        <div class="tipo">
            <button type="button" id="btnComprador" class="ativo">Comprador</button>
            <button type="button" id="btnVendedor">Vendedor</button>
        </div>
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="tel" id="telefone" placeholder="Telefone">
        <input type="password" id="senha" placeholder="Senha">
        <div id="camposVendedor" style="display: none;">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="text" id="pix" placeholder="Chave PIX">
            <input type="text" id="endereco" placeholder="Endereço">
        </div>
        <button onclick="cadastrar()">Cadastrar</button>
        <p><a href="login.html">Já tem conta? Faça login</a></p>
        <p id="msg"></p>
    </div>

    <script>
        const API_URL = 'https://aceitae33-api.onrender.com';

        let tipo = 'comprador';
        document.getElementById('btnComprador').onclick = () => {
            tipo = 'comprador';
            document.getElementById('btnComprador').classList.add('ativo');
            document.getElementById('btnVendedor').classList.remove('ativo');
            document.getElementById('camposVendedor').style.display = 'none';
        };
        document.getElementById('btnVendedor').onclick = () => {
            tipo = 'vendedor';
            document.getElementById('btnVendedor').classList.add('ativo');
            document.getElementById('btnComprador').classList.remove('ativo');
            document.getElementById('camposVendedor').style.display = 'block';
        };

        async function cadastrar() {
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                senha: document.getElementById('senha').value,
                tipo: tipo,
                cpf: document.getElementById('cpf').value || null,
                pix: document.getElementById('pix').value || null,
                endereco: document.getElementById('endereco').value || null
            };

            const msg = document.getElementById('msg');

            try {
                const response = await fetch(`${API_URL}/cadastrar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    msg.style.color = 'green';
                    msg.innerText = 'Cadastro realizado!';
                    setTimeout(() => location.href = 'login.html', 1500);
                } else {
                    msg.style.color = 'red';
                    msg.innerText = data.detail || 'Erro ao cadastrar';
                }
            } catch (error) {
                msg.style.color = 'red';
                msg.innerText = 'Erro de conexão';
            }
        }
    </script>
</body>
</html>
