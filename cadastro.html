<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ACEITAÊ - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1A237E 0%,#00C853 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .card{background:white;padding:40px;border-radius:24px;width:100%;max-width:480px;box-shadow:0 20px 40px rgba(0,0,0,0.2);text-align:center}
        .logo h1{font-size:28px;color:#1A237E}
        .logo h1 span{color:#00C853}
        .logo p{color:#666;font-size:12px;margin-top:4px}
        h2{color:#333;margin-bottom:24px;font-size:20px}
        .form-group{margin-bottom:16px;text-align:left}
        .form-group label{display:block;margin-bottom:6px;font-weight:600;color:#1A237E;font-size:13px}
        .form-group input, .form-group select{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #ddd;font-size:14px;transition:all .3s;outline:none}
        .form-group input:focus, .form-group select:focus{border-color:#00C853;box-shadow:0 0 0 3px rgba(0,200,83,0.1)}
        .form-group small{color:#999;font-size:11px;display:block;margin-top:4px}
        button{width:100%;padding:12px;border-radius:40px;border:none;background:#00C853;color:white;font-weight:bold;font-size:16px;cursor:pointer;transition:all .3s}
        button:hover{background:#00A844;transform:scale(1.02)}
        .link-login{margin-top:20px;font-size:13px;color:#666}
        .link-login a{color:#00C853;text-decoration:none;font-weight:bold}
        .error{color:#c62828;margin-top:12px;padding:10px;background:#ffebee;border-radius:8px;font-size:13px}
        .success{color:#2e7d32;margin-top:12px;padding:10px;background:#e8f5e9;border-radius:8px;font-size:13px}
        .info{font-size:11px;color:#999;margin-top:20px;padding-top:16px;border-top:1px solid #eee}
        .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media (max-width:480px){.card{padding:24px}.row-2{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>ACEIT<span>AÊ</span></h1>
        <p>Faça a oferta. Torça pelo ACEITAÊ!</p>
    </div>
    <h2>Criar minha conta</h2>

    <form id="formCadastro">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Nome completo *</label>
            <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> E-mail *</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Telefone *</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> CPF *</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                <small>Necessário para pagamentos</small>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Tipo de conta *</label>
                <select id="tipo" required>
                    <option value="comprador">Comprador</option>
                    <option value="vendedor">Vendedor</option>
                    <option value="ambos">Comprador e Vendedor</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-whatsapp"></i> WhatsApp (opcional)</label>
            <input type="tel" id="whatsapp" placeholder="(11) 99999-9999">
            <small>Para receber notificações de ofertas</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Senha *</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Confirmar senha *</label>
            <input type="password" id="confirmar_senha" placeholder="Digite a senha novamente" required>
        </div>

        <button type="submit"><i class="fas fa-user-plus"></i> Criar conta</button>
    </form>

    <div id="mensagem" class="mensagem"></div>
    <div class="link-login">Já tem uma conta? <a href="login.html">Entrar</a></div>
    <div class="info"><i class="fas fa-shield-alt"></i> Seus dados estão seguros</div>
</div>

<script>
    var API_URL = 'https://aceitae33-api.onrender.com';

    document.getElementById('formCadastro').addEventListener('submit', function(e) {
        e.preventDefault();

        var nome = document.getElementById('nome').value.trim();
        var email = document.getElementById('email').value.trim();
        var telefone = document.getElementById('telefone').value.trim();
        var cpf = document.getElementById('cpf').value.trim();
        var tipo = document.getElementById('tipo').value;
        var whatsapp = document.getElementById('whatsapp').value.trim();
        var senha = document.getElementById('senha').value;
        var confirmarSenha = document.getElementById('confirmar_senha').value;
        var msgDiv = document.getElementById('mensagem');

        // Validações básicas
        if (!nome || !email || !telefone || !cpf || !senha || !confirmarSenha) {
            msgDiv.innerHTML = '<div class="error">⚠️ Preencha todos os campos obrigatórios!</div>';
            return;
        }

        if (senha.length < 6) {
            msgDiv.innerHTML = '<div class="error">⚠️ A senha deve ter pelo menos 6 caracteres!</div>';
            return;
        }

        if (senha !== confirmarSenha) {
            msgDiv.innerHTML = '<div class="error">⚠️ As senhas não coincidem!</div>';
            return;
        }

        // Remove formatação do CPF
        var cpfLimpo = cpf.replace(/\D/g, '');

        if (cpfLimpo.length !== 11) {
            msgDiv.innerHTML = '<div class="error">⚠️ Digite um CPF válido com 11 dígitos!</div>';
            return;
        }

        var btn = document.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Cadastrando...';

        fetch(API_URL + '/cadastrar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome: nome,
                email: email,
                telefone: telefone,
                cpf: cpfLimpo,
                tipo: tipo,
                whatsapp: whatsapp || null,
                senha: senha
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (res.ok) {
                msgDiv.innerHTML = '<div class="success">✅ Cadastro realizado com sucesso! Redirecionando...</div>';
                setTimeout(function() { window.location.href = 'login.html'; }, 2000);
            } else {
                msgDiv.innerHTML = '<div class="error">❌ ' + (data.detail || 'Erro ao cadastrar') + '</div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar conta';
            }
        })
        .catch(function(error) {
            msgDiv.innerHTML = '<div class="error">❌ Erro de conexão: ' + error.message + '</div>';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar conta';
        });
    });

    // Máscara para CPF
    document.getElementById('cpf').addEventListener('input', function(e) {
        var value = this.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length > 9) {
                this.value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else if (value.length > 6) {
                this.value = value.replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3');
            } else if (value.length > 3) {
                this.value = value.replace(/(\d{3})(\d{3})/, '$1.$2');
            } else {
                this.value = value;
            }
        }
    });

    // Máscara para telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
        var value = this.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length > 10) {
                this.value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 6) {
                this.value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 2) {
                this.value = value.replace(/(\d{2})(\d{4})/, '($1) $2');
            } else {
                this.value = value;
            }
        }
    });

    // Máscara para WhatsApp
    document.getElementById('whatsapp').addEventListener('input', function(e) {
        var value = this.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length > 10) {
                this.value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 6) {
                this.value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 2) {
                this.value = value.replace(/(\d{2})(\d{4})/, '($1) $2');
            } else {
                this.value = value;
            }
        }
    });
</script>
</body>
</html>
