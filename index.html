<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ACEITAÊ - Comprar</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; margin: 0; padding: 20px; }
        .header { background: #1A237E; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; }
        .produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #f5f5f5; }
        .card h3 { margin: 0 0 5px 0; font-size: 18px; }
        .card p { margin: 5px 0; color: #666; font-size: 14px; }
        .preco { font-size: 22px; font-weight: bold; color: #1A237E; margin: 10px 0; }
        button { background: #00C853; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #00A844; }
        .btn-entrar { background: transparent; border: 1px solid white; width: auto; }
        .btn-entrar:hover { background: rgba(255,255,255,0.2); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #c62828; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .logout-btn:hover { background: #b71c1c; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
<div class="header">
    <h2>ACEITAÊ</h2>
    <div class="user-info" id="userInfo">
        <span id="userName"></span>
        <button id="btnEntrar" class="btn-entrar" onclick="location.href='login.html'">Entrar</button>
        <button id="btnSair" class="logout-btn" style="display:none;" onclick="logout()">Sair</button>
    </div>
</div>
<div class="container">
    <h3>Produtos disponíveis</h3>
    <div id="produtos" class="loading">Carregando produtos...</div>
</div>

<script>
    const API_URL = 'https://aceitae33-api.onrender.com';
    const token = localStorage.getItem('access_token');
    const usuarioNome = localStorage.getItem('usuario_nome');
    const usuarioId = localStorage.getItem('usuario_id');

    if (usuarioNome) {
        document.getElementById('userName').innerHTML = `Olá, ${usuarioNome}`;
        document.getElementById('btnEntrar').style.display = 'none';
        document.getElementById('btnSair').style.display = 'inline-block';
    }

    async function carregarProdutos() {
        try {
            const response = await fetch(`${API_URL}/produtos?status=aprovado`);
            const data = await response.json();
            const container = document.getElementById('produtos');
            
            if (!data.produtos || data.produtos.length === 0) {
                container.innerHTML = '<p class="loading">Nenhum produto disponível no momento.</p>';
                return;
            }
            
            container.innerHTML = data.produtos.map(p => {
                // Verifica se tem foto
                let imagemHtml = '';
                if (p.fotos && Array.isArray(p.fotos) && p.fotos.length > 0 && p.fotos[0]) {
                    const fotoUrl = p.fotos[0];
                    if (typeof fotoUrl === 'string' && fotoUrl.startsWith('http')) {
                        imagemHtml = `<img src="${fotoUrl}" alt="${p.nome}" onerror="this.style.display='none'">`;
                    } else {
                        imagemHtml = `<div style="height:180px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#ccc;">📷 Sem imagem</div>`;
                    }
                } else {
                    imagemHtml = `<div style="height:180px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#ccc;">📷 Sem imagem</div>`;
                }
                
                return `
                    <div class="card">
                        ${imagemHtml}
                        <h3>${escapeHtml(p.nome)}</h3>
                        <p>${escapeHtml(p.descricao?.substring(0, 80) || '')}${p.descricao?.length > 80 ? '...' : ''}</p>
                        <div class="preco">R$ ${p.valor_exposicao?.toFixed(2) || p.valor_exposicao}</div>
                        <button onclick="fazerOferta(${p.id})">Fazer Oferta</button>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error('Erro:', error);
            document.getElementById('produtos').innerHTML = '<p class="loading">Erro ao carregar produtos. Verifique o servidor.</p>';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function fazerOferta(produtoId) {
        if (!usuarioId) {
            alert('Faça login para fazer uma oferta!');
            window.location.href = 'login.html';
            return;
        }
        const valor = prompt('Digite o valor da sua oferta (R$):');
        if (!valor || isNaN(parseFloat(valor))) {
            alert('Digite um valor válido!');
            return;
        }

        try {
            const response = await fetch(`${API_URL}/ofertas?comprador_id=${usuarioId}&comprador_nome=${usuarioNome || 'Usuario'}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ produto_id: produtoId, valor: parseFloat(valor) })
            });
            const data = await response.json();
            if (response.ok) {
                alert(data.mensagem);
                if (data.status === 'venda_automatica') {
                    carregarProdutos(); // Recarrega a lista
                }
            } else {
                alert(data.detail || 'Erro ao fazer oferta');
            }
        } catch (error) {
            alert('Erro de conexão: ' + error.message);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    carregarProdutos();
</script>
</body>
</html>
