<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ</title>
    <style>
        body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;text-align:center}
        .produto{background:white;padding:16px;margin:12px auto;max-width:300px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
        .produto img{max-width:100%;height:auto;max-height:150px;object-fit:contain}
        .preco{font-size:20px;font-weight:bold;color:#1A237E}
        .btn{background:#00C853;color:white;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:bold}
        .btn:hover{background:#00A844}
        input{padding:8px;border:1px solid #ddd;border-radius:6px;width:80px}
        .flex{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
        .header{background:#1A237E;color:white;padding:16px;margin:-20px -20px 20px -20px}
        .header h1{font-size:24px}
        .header span{color:#00C853}
        .loading{padding:40px;color:#999}
    </style>
</head>
<body>

<div class="header">
    <h1>ACEIT<span>AÊ</span></h1>
    <p>Faça sua oferta. Torça pelo ACEITAÊ!</p>
</div>

<div id="produtos" class="loading">Carregando produtos...</div>

<script>
var API_URL = 'https://aceitae33-api.onrender.com';
var usuarioId = localStorage.getItem('usuario_id');
var usuarioNome = localStorage.getItem('usuario_nome');

var produtosOriginais = [];

async function carregarProdutos() {
    var container = document.getElementById('produtos');
    container.innerHTML = 'Carregando...';
    
    try {
        var response = await fetch(API_URL + '/produtos?status=aprovado');
        var data = await response.json();
        
        if (!data.produtos || data.produtos.length === 0) {
            container.innerHTML = '😢 Nenhum produto disponível.';
            return;
        }
        
        produtosOriginais = data.produtos;
        renderizarProdutos(produtosOriginais);
    } catch (error) {
        console.error('Erro:', error);
        container.innerHTML = '❌ Erro ao carregar produtos: ' + error.message;
    }
}

function renderizarProdutos(produtos) {
    var container = document.getElementById('produtos');
    container.innerHTML = '';
    
    for (var i = 0; i < produtos.length; i++) {
        var p = produtos[i];
        var preco = parseFloat(p.valor_exposicao) || 0;
        var fotos = p.fotos && p.fotos.length > 0 ? p.fotos[0] : '';
        
        var div = document.createElement('div');
        div.className = 'produto';
        
        var imgHtml = fotos ? '<img src="' + fotos + '" alt="' + p.nome + '">' : '📦';
        
        div.innerHTML = 
            imgHtml +
            '<h3>' + (p.nome || 'Produto') + '</h3>' +
            '<p>' + (p.descricao || '') + '</p>' +
            '<div class="preco">R$ ' + preco.toFixed(2) + '</div>' +
            '<p>Estoque: ' + (p.quantidade || 1) + ' unidade(s)</p>' +
            '<p>' + (p.condicao === 'novo' ? '🆕 Novo' : '🔄 Usado') + '</p>' +
            '<div class="flex">' +
                '<input type="number" id="valor-' + p.id + '" placeholder="Oferta" step="0.01">' +
                '<button class="btn" onclick="fazerOferta(' + p.id + ')">Ofertar</button>' +
            '</div>' +
            '<div id="msg-' + p.id + '" style="margin-top:6px;font-size:12px;color:#c62828;"></div>';
        
        container.appendChild(div);
    }
}

async function fazerOferta(produtoId) {
    if (!usuarioId) {
        alert('Faça login para fazer uma oferta!');
        window.location.href = 'login.html';
        return;
    }
    
    var input = document.getElementById('valor-' + produtoId);
    var valor = parseFloat(input.value);
    var msgDiv = document.getElementById('msg-' + produtoId);
    
    if (!valor || valor <= 0) {
        msgDiv.textContent = 'Digite um valor válido!';
        msgDiv.style.color = '#c62828';
        setTimeout(function() { msgDiv.textContent = ''; }, 3000);
        return;
    }
    
    msgDiv.textContent = 'Enviando...';
    msgDiv.style.color = '#1A237E';
    
    try {
        var response = await fetch(API_URL + '/ofertas?comprador_id=' + usuarioId + '&comprador_nome=' + encodeURIComponent(usuarioNome || 'Usuario'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ produto_id: produtoId, valor: valor })
        });
        
        var data = await response.json();
        
        if (response.ok) {
            msgDiv.textContent = '✅ Oferta enviada!';
            msgDiv.style.color = '#2e7d32';
            input.value = '';
            if (data.status === 'venda_automatica') {
                alert('✅ VENDA AUTOMÁTICA!');
                carregarProdutos();
            }
        } else {
            var erro = data.detail || 'Erro ao enviar';
            if (typeof erro === 'object') erro = JSON.stringify(erro);
            msgDiv.textContent = '❌ ' + erro;
            msgDiv.style.color = '#c62828';
        }
    } catch (error) {
        msgDiv.textContent = '❌ Erro de conexão: ' + error.message;
        msgDiv.style.color = '#c62828';
    }
}

carregarProdutos();
</script>

<p style="margin-top:30px;font-size:12px;color:#999;">
    <a href="vendedor.html" style="color:#1A237E;">Central do Vendedor</a> | 
    <a href="anunciar.html" style="color:#1A237E;">Anunciar</a> | 
    <a href="login.html" style="color:#1A237E;">Entrar</a>
</p>
</body>
</html>
