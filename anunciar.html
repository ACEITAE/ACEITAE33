<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ - Anunciar Produto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1A237E 0%, #283593 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #1A237E; margin-bottom: 10px; }
        h1 span { color: #00C853; }
        .sub { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #00C853; }
        textarea { resize: vertical; min-height: 100px; }
        button {
            width: 100%;
            padding: 14px;
            background: #00C853;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #00A844; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover { color: #00C853; }
        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .mensagem.sucesso { background: #e8f5e9; color: #2e7d32; display: block; }
        .mensagem.erro { background: #ffebee; color: #c62828; display: block; }
        .categoria-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .categoria-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .categoria-btn.active { background: #00C853; color: white; }

        /* Estilos para upload de fotos */
        .foto-area {
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .foto-area:hover { border-color: #00C853; }
        .foto-area i { font-size: 48px; color: #999; margin-bottom: 10px; }
        .foto-area p { color: #999; font-size: 14px; }
        .preview-fotos { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #e0e0e0; }
        .upload-status { font-size: 12px; margin-top: 8px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>ACEIT<span>AÊ</span></h1>
        <div class="sub">Anuncie seu produto <strong>gratuitamente</strong><br>Só paga 10% de comissão quando vender!</div>

        <form id="anunciarForm">
            <div class="form-group">
                <label>Nome do produto *</label>
                <input type="text" id="nome" placeholder="Ex: iPhone 13 128GB Azul" required>
            </div>

            <div class="form-group">
                <label>Descrição *</label>
                <textarea id="descricao" placeholder="Descreva o produto, estado de conservação, avarias..." required></textarea>
            </div>

            <div class="form-group">
                <label>Categoria *</label>
                <div class="categoria-group" id="categoriaGroup">
                    <div class="categoria-btn" data-cat="Eletrônicos">📱 Eletrônicos</div>
                    <div class="categoria-btn" data-cat="Moda">👕 Moda</div>
                    <div class="categoria-btn" data-cat="Casa">🏠 Casa</div>
                    <div class="categoria-btn" data-cat="Esporte">⚽ Esporte</div>
                    <div class="categoria-btn" data-cat="Outros">📦 Outros</div>
                </div>
                <input type="hidden" id="categoria" required>
            </div>

            <div class="form-group">
                <label>Valor pretendido *</label>
                <input type="number" id="valorPretendido" placeholder="R$ 0,00" step="0.01" required>
                <small style="color:#999;">Você receberá este valor. Anunciaremos com +10%.</small>
            </div>

            <!-- CAMPO DE UPLOAD DE FOTOS -->
            <div class="form-group">
                <label>Fotos do produto *</label>
                <div class="foto-area" id="fotoArea">
                    <i class="fas fa-camera"></i>
                    <p>Clique para adicionar fotos</p>
                    <input type="file" id="fotosInput" multiple accept="image/*" style="display: none;">
                </div>
                <div id="previewFotos" class="preview-fotos"></div>
                <div id="uploadStatus" class="upload-status"></div>
                <small>Adicione pelo menos uma foto do produto</small>
            </div>

            <div class="form-group">
                <label>Link do vídeo (opcional)</label>
                <input type="url" id="video" placeholder="YouTube, Google Drive, etc.">
            </div>

            <button type="submit" id="btnSubmit">Anunciar Grátis</button>
        </form>

        <a href="vendedor.html" class="back-link">← Voltar para meu painel</a>
        <div id="mensagem" class="mensagem"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
<script>
    const API_URL = 'https://aceitae33-api.onrender.com';
    const usuarioId = localStorage.getItem('usuario_id');
    const usuarioTipo = localStorage.getItem('usuario_tipo');

    if (!usuarioId || usuarioTipo !== 'vendedor') {
        alert('Área exclusiva para vendedores! Faça login como vendedor.');
        window.location.href = 'login.html';
    }

    // ==================================================
    // CATEGORIAS
    // ==================================================
    let categoriaSelecionada = '';
    document.querySelectorAll('.categoria-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            categoriaSelecionada = this.getAttribute('data-cat');
            document.getElementById('categoria').value = categoriaSelecionada;
        });
    });

    // ==================================================
    // UPLOAD DE FOTOS
    // ==================================================
    const fotoArea = document.getElementById('fotoArea');
    const fotosInput = document.getElementById('fotosInput');
    const previewFotos = document.getElementById('previewFotos');
    const uploadStatus = document.getElementById('uploadStatus');
    let fotosUrls = [];

    fotoArea.addEventListener('click', () => fotosInput.click());

    async function fazerUploadFoto(file) {
    const token = localStorage.getItem('access_token');
    const formData = new FormData();
    formData.append('arquivo', file);

    try {
        const response = await fetch(`${API_URL}/upload-foto`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            },
            body: formData
        });
        const data = await response.json();
        if (response.ok) {
            return data.url;
        } else {
            throw new Error(data.detail || 'Erro no upload');
        }
    } catch (error) {
        throw new Error(error.message);
    }
}
    fotosInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        const btnSubmit = document.getElementById('btnSubmit');

        if (files.length === 0) return;

        btnSubmit.disabled = true;
        uploadStatus.innerHTML = '⏳ Enviando fotos... Aguarde';
        uploadStatus.style.color = '#f57f17';

        for (const file of files) {
            try {
                const url = await fazerUploadFoto(file);
                fotosUrls.push(url);
                atualizarPreview();
                uploadStatus.innerHTML = `✅ ${fotosUrls.length} foto(s) enviada(s)`;
                uploadStatus.style.color = '#2e7d32';
            } catch (error) {
                uploadStatus.innerHTML = `❌ Erro: ${error.message}`;
                uploadStatus.style.color = '#c62828';
            }
        }

        btnSubmit.disabled = false;
        if (fotosUrls.length === 0) {
            uploadStatus.innerHTML = '❌ Nenhuma foto foi enviada. Tente novamente.';
        }
    });

    function atualizarPreview() {
        previewFotos.innerHTML = '';
        fotosUrls.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'preview-img';
            previewFotos.appendChild(img);
        });
    }

    // ==================================================
    // ENVIO DO FORMULÁRIO
    // ==================================================
    document.getElementById('anunciarForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nome = document.getElementById('nome').value;
        const descricao = document.getElementById('descricao').value;
        const categoria = document.getElementById('categoria').value;
        const valorPretendido = parseFloat(document.getElementById('valorPretendido').value);
        const video = document.getElementById('video').value;

        if (!nome || !descricao || !categoria || !valorPretendido) {
            alert('Preencha todos os campos obrigatórios!');
            return;
        }

        if (fotosUrls.length === 0) {
            alert('Adicione pelo menos uma foto do produto!');
            return;
        }

        const msgDiv = document.getElementById('mensagem');
        const btnSubmit = document.getElementById('btnSubmit');

        const dados = {
            nome, descricao, categoria,
            valor_pretendido: valorPretendido,
            fotos: fotosUrls,
            video: video || null
        };

        btnSubmit.disabled = true;
        btnSubmit.innerHTML = 'Enviando...';

        try {
            const response = await fetch(`${API_URL}/produtos?vendedor_id=${usuarioId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const data = await response.json();

            if (response.ok) {
                msgDiv.className = 'mensagem sucesso';
                msgDiv.innerHTML = '✅ Produto cadastrado! Aguardando vistoria.';
                setTimeout(() => window.location.href = 'vendedor.html', 2000);
            } else {
                msgDiv.className = 'mensagem erro';
                msgDiv.innerHTML = `❌ ${data.detail || 'Erro ao anunciar'}`;
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Anunciar Grátis';
            }
        } catch (error) {
            console.error('Erro:', error);
            msgDiv.className = 'mensagem erro';
            msgDiv.innerHTML = '❌ Erro de conexão';
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = 'Anunciar Grátis';
        }
    });
</script>
</body>
</html>
