<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ACEITAÊ - Meus Pedidos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
        
        .header{background:#fff;padding:12px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.05);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;position:sticky;top:0;z-index:100}
        .logo-area{display:flex;align-items:center;gap:12px}
        .logo-img{height:36px;width:auto}
        .logo-text{font-size:20px;font-weight:bold;color:#1A237E}
        .logo-text span{color:#00C853}
        .header-actions{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
        .btn-voltar{background:#f0f0f0;padding:8px 20px;border-radius:30px;text-decoration:none;color:#666;font-size:13px;display:inline-flex;align-items:center;gap:8px}
        .btn-voltar:hover{background:#e0e0e0}
        .btn-sair{background:#c62828;padding:8px 18px;border-radius:30px;color:#fff;border:none;cursor:pointer;font-size:13px}
        .btn-sair:hover{background:#b71c1c}
        
        .container{max-width:900px;margin:0 auto;padding:24px}
        .hero{background:linear-gradient(135deg,#1A237E 0%,#00C853 100%);border-radius:20px;padding:24px 30px;color:#fff;margin-bottom:30px}
        .hero h1{font-size:24px;margin-bottom:4px}
        .hero p{opacity:.9;font-size:14px}
        
        .stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
        .stat-card{background:#fff;padding:16px 24px;border-radius:16px;flex:1;min-width:120px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
        .stat-number{font-size:28px;font-weight:bold;color:#00C853}
        .stat-label{font-size:12px;color:#666;margin-top:4px}
        
        .oferta-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:flex;flex-wrap:wrap;align-items:center;gap:16px}
        .oferta-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12)}
        .oferta-info{flex:2;min-width:200px}
        .oferta-info h3{font-size:16px;color:#1A237E;margin-bottom:4px}
        .oferta-info p{font-size:13px;color:#666}
        .oferta-valor{flex:1;min-width:100px;text-align:center}
        .oferta-valor .preco{font-size:22px;font-weight:bold;color:#00C853}
        .oferta-status{padding:6px 14px;border-radius:30px;font-size:12px;font-weight:bold;display:inline-block}
        .status-pendente{background:#fff8e1;color:#f57f17}
        .status-aguardando_pagamento{background:#e3f2fd;color:#1565c0}
        .status-pago{background:#e8f5e9;color:#2e7d32}
        .status-aceita{background:#e8f5e9;color:#2e7d32}
        .status-recusada{background:#ffebee;color:#c62828}
        
        .btn-pagar{background:#00C853;color:#fff;border:none;padding:10px 24px;border-radius:30px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .3s}
        .btn-pagar:hover{background:#00A844;transform:scale(1.02)}
        .btn-pagar:disabled{opacity:.5;cursor:not-allowed}
        
        .loading{text-align:center;padding:40px;color:#999}
        .sem-itens{text-align:center;padding:40px;color:#999}
        
        @media (max-width:640px){.header{flex-direction:column;text-align:center}.stats{flex-direction:column}.oferta-card{flex-direction:column;text-align:center}}
    </style>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.jpeg" alt="ACEITAÊ" class="logo-img" onerror="this.style.display='none'">
        <div class="logo-text">ACEIT<span>AÊ</span></div>
    </div>
    <div class="header-actions">
        <a href="index.html" class="btn-voltar"><i class="fas fa-store"></i> Loja</a>
        <button class="btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
</div>

<div class="container">
    <div class="hero">
        <h1><i class="fas fa-shopping-bag"></i> Meus Pedidos</h1>
        <p>Acompanhe o status das suas ofertas. Quando o vendedor ACEITAR, você poderá pagar.</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="total-ofertas">0</div>
            <div class="stat-label">Ofertas feitas</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="total-aguardando">0</div>
            <div class="stat-label">Aguardando pagamento</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="total-pagos">0</div>
            <div class="stat-label">Pagos</div>
        </div>
    </div>

    <div id="ofertas-container" class="loading">Carregando suas ofertas...</div>
</div>

<script>
    var API_URL = 'https://aceitae33-api.onrender.com';
    var usuarioId = localStorage.getItem('usuario_id');
    var usuarioNome = localStorage.getItem('usuario_nome');

    if (!usuarioId) {
        window.location.href = 'login.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    // ==================== CARREGAR OFERTAS DO COMPRADOR ====================
    async function carregarOfertas() {
        var container = document.getElementById('ofertas-container');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando...</div>';

        try {
            var response = await fetch(API_URL + '/ofertas?comprador_id=' + usuarioId);
            var data = await response.json();
            
            if (!data.ofertas || data.ofertas.length === 0) {
                container.innerHTML = '<div class="sem-itens">📦 Você ainda não fez nenhuma oferta.</div>';
                return;
            }

            var ofertas = data.ofertas;
            var totalOfertas = ofertas.length;
            var aguardandoPagamento = 0;
            var pagos = 0;

            for (var i = 0; i < ofertas.length; i++) {
                if (ofertas[i].status === 'aguardando_pagamento' || ofertas[i].status === 'aceita') aguardandoPagamento++;
                if (ofertas[i].status === 'pago') pagos++;
            }

            document.getElementById('total-ofertas').textContent = totalOfertas;
            document.getElementById('total-aguardando').textContent = aguardandoPagamento;
            document.getElementById('total-pagos').textContent = pagos;

            container.innerHTML = '';
            
            for (var i = 0; i < ofertas.length; i++) {
                var o = ofertas[i];
                var card = document.createElement('div');
                card.className = 'oferta-card';
                
                var statusText = '';
                var statusClass = '';
                var podePagar = false;
                var linkPagamento = '';

                if (o.status === 'pendente') { statusText = '⏳ Aguardando vendedor'; statusClass = 'status-pendente'; }
                else if (o.status === 'aguardando_pagamento') { 
                    statusText = '💳 Aguardando pagamento'; 
                    statusClass = 'status-aguardando_pagamento'; 
                    podePagar = true;
                    linkPagamento = '/pagamento.html?oferta=' + o.id;
                }
                else if (o.status === 'aceita') { 
                    statusText = '✅ Oferta aceita! Pague agora'; 
                    statusClass = 'status-aguardando_pagamento'; 
                    podePagar = true;
                    linkPagamento = '/pagamento.html?oferta=' + o.id;
                }
                else if (o.status === 'pago') { statusText = '✅ Pago'; statusClass = 'status-pago'; }
                else if (o.status === 'recusada') { statusText = '❌ Recusada'; statusClass = 'status-recusada'; }
                else { statusText = o.status; statusClass = 'status-pendente'; }

                var dataOferta = new Date(o.criado_em);
                var dataFormatada = dataOferta.toLocaleDateString('pt-BR') + ' ' + dataOferta.toLocaleTimeString('pt-BR');

                card.innerHTML = 
                    '<div class="oferta-info">' +
                        '<h3>' + escapeHtml(o.produto_nome) + '</h3>' +
                        '<p><i class="fas fa-store"></i> Vendedor: ' + escapeHtml(o.vendedor_nome || 'ACEITAÊ') + '</p>' +
                        '<p style="font-size:12px;color:#999;">' + dataFormatada + '</p>' +
                        '<div class="oferta-status ' + statusClass + '" style="margin-top:8px;">' + statusText + '</div>' +
                    '</div>' +
                    '<div class="oferta-valor">' +
                        '<div class="preco">R$ ' + o.valor.toFixed(2) + '</div>' +
                        (podePagar ? '<button class="btn-pagar" onclick="irParaPagamento(' + o.id + ')"><i class="fas fa-credit-card"></i> Pagar</button>' : '') +
                    '</div>';

                container.appendChild(card);
            }
        } catch (error) {
            console.error('Erro:', error);
            container.innerHTML = '<div class="sem-itens">❌ Erro ao carregar ofertas: ' + error.message + '</div>';
        }
    }

    function irParaPagamento(ofertaId) {
        window.location.href = '/pagamento.html?oferta=' + ofertaId;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    carregarOfertas();
</script>
</body>
</html>
