<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ACEITAÊ - Pagamento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;min-height:100vh}
        .header{background:#1A237E;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
        .header .logo{color:#fff;font-size:20px;font-weight:bold}
        .header .logo span{color:#00C853}
        .header a{color:#fff;text-decoration:none;font-size:14px;margin-left:auto}
        .container{max-width:800px;margin:30px auto;padding:0 16px}
        .card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
        .card h1{font-size:24px;color:#1A237E;margin-bottom:8px}
        .card .subtitle{color:#666;font-size:14px;margin-bottom:24px}
        .status-badge{padding:8px 16px;border-radius:30px;font-size:13px;font-weight:bold;display:inline-block}
        .status-aguardando{background:#fff8e1;color:#f57f17}
        .status-pago{background:#e8f5e9;color:#2e7d32}
        .produto-info{display:flex;gap:20px;padding:16px;background:#f9f9f9;border-radius:16px;margin:20px 0}
        .produto-info .detalhes h3{font-size:16px;color:#1A237E}
        .produto-info .detalhes p{color:#666;font-size:13px;margin-top:4px}
        .valores{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee}
        .valores .label{color:#666;font-size:14px}
        .valores .value{font-weight:bold;font-size:16px;color:#1A237E}
        .valores.total{border-bottom:none;padding-top:16px}
        .valores.total .value{font-size:24px;color:#00C853}
        .metodo-pagamento{display:flex;gap:12px;margin:24px 0;flex-wrap:wrap}
        .metodo-btn{flex:1;padding:16px;border:2px solid #ddd;border-radius:16px;text-align:center;cursor:pointer;transition:all .3s;background:#fff;min-width:120px}
        .metodo-btn:hover{border-color:#00C853}
        .metodo-btn.active{border-color:#00C853;background:#e8f5e9}
        .metodo-btn i{font-size:28px;display:block;margin-bottom:8px}
        .metodo-btn .icon-pix{color:#00C853}
        .metodo-btn .icon-cartao{color:#1A237E}
        .pix-area{background:#f9f9f9;padding:20px;border-radius:16px;text-align:center;margin:20px 0}
        .pix-area .codigo-pix{background:#fff;padding:12px;border-radius:8px;font-size:14px;word-break:break-all;border:1px solid #ddd;cursor:pointer}
        .pix-area .codigo-pix:hover{background:#f0f0f0}
        .pix-area .copiado{color:#00C853;font-weight:bold;margin-top:8px;display:none}
        .cartao-area{display:none;margin-top:20px}
        .btn-pagar{width:100%;padding:16px;background:#00C853;color:#fff;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;transition:all .3s}
        .btn-pagar:hover{background:#00A844;transform:scale(1.02)}
        .btn-pagar:disabled{opacity:.6;cursor:not-allowed}
        .loading{text-align:center;padding:40px;color:#999}
        .loading i{font-size:40px;margin-bottom:16px}
        .erro-box{text-align:center;padding:40px}
        .erro-box i{font-size:48px;color:#c62828}
        .erro-box p{margin-top:16px;font-size:18px}
        .qr-placeholder{background:#f0f0f0;padding:30px;border-radius:12px;margin:16px 0;text-align:center}
        .qr-placeholder i{font-size:48px;color:#00C853}
        @media (max-width:640px){.produto-info{flex-direction:column;align-items:center;text-align:center}.metodo-btn{flex:1 1 100%}}
    </style>
</head>
<body>

<div class="header">
    <div class="logo">ACEIT<span>AÊ</span></div>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar à loja</a>
</div>

<div class="container">
    <div class="card" id="pagamentoContainer">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i><br>Carregando pagamento...</div>
    </div>
</div>

<script>
    var API_URL = 'https://aceitae33-api.onrender.com';
    var urlParams = new URLSearchParams(window.location.search);
    var ofertaId = urlParams.get('oferta');

    async function carregarPagamento() {
        var container = document.getElementById('pagamentoContainer');
        if (!ofertaId) {
            container.innerHTML = '<div class="erro-box"><i class="fas fa-exclamation-triangle"></i><p>Oferta não encontrada</p><a href="index.html" style="color:#00C853;display:inline-block;margin-top:12px;">Voltar para loja</a></div>';
            return;
        }
        try {
            var response = await fetch(API_URL + '/ofertas/' + ofertaId);
            var data = await response.json();
            if (!data || !data.id) throw new Error('Oferta não encontrada');
            renderizarPagamento(data);
        } catch (error) {
            container.innerHTML = '<div class="erro-box"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar pagamento</p><p style="font-size:14px;color:#666;">' + error.message + '</p><a href="index.html" style="color:#00C853;display:inline-block;margin-top:12px;">Voltar para loja</a></div>';
        }
    }

    function renderizarPagamento(oferta) {
        var container = document.getElementById('pagamentoContainer');
        var statusText = 'Aguardando pagamento';
        var statusClass = 'status-aguardando';
        if (oferta.status === 'pago') { statusText = '✅ Pagamento confirmado'; statusClass = 'status-pago'; }
        var parcelas = oferta.parcelas || 1;
        var valorParcela = oferta.valor / parcelas;

        container.innerHTML = `
            <h1>🧾 Pagamento</h1>
            <p class="subtitle">Confira os dados e escolha como pagar</p>
            <div class="status-badge ${statusClass}">${statusText}</div>
            <div class="produto-info">
                <div style="width:100px;height:100px;background:#f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-box" style="font-size:40px;color:#ccc;"></i></div>
                <div class="detalhes"><h3>${escapeHtml(oferta.produto_nome)}</h3><p>Vendedor: ${escapeHtml(oferta.vendedor_nome || 'ACEITAÊ')}</p><p>📦 ${oferta.quantidade || 1} unidade(s)</p></div>
            </div>
            <div class="valores"><span class="label">Valor da oferta</span><span class="value">R$ ${oferta.valor.toFixed(2)}</span></div>
            <div class="valores"><span class="label">Parcelas</span><span class="value">${parcelas}x de R$ ${valorParcela.toFixed(2)}</span></div>
            <div class="valores total"><span class="label">Total a pagar</span><span class="value">R$ ${oferta.valor.toFixed(2)}</span></div>
            <div style="margin:24px 0 12px;"><p style="font-weight:bold;color:#1A237E;margin-bottom:12px;">Escolha como pagar</p>
            <div class="metodo-pagamento">
                <div class="metodo-btn active" data-metodo="pix" onclick="selecionarMetodo('pix')"><i class="fas fa-qrcode icon-pix"></i><span>PIX</span><div style="font-size:11px;color:#666;">Pagamento instantâneo</div></div>
                <div class="metodo-btn" data-metodo="cartao" onclick="selecionarMetodo('cartao')"><i class="fas fa-credit-card icon-cartao"></i><span>Cartão de Crédito</span><div style="font-size:11px;color:#666;">Parcelamento</div></div>
            </div></div>
            <div id="pixArea" class="pix-area">
                <p><i class="fas fa-qrcode" style="font-size:24px;color:#00C853;"></i></p>
                <p style="font-weight:bold;">Pague com PIX</p>
                <p style="font-size:13px;color:#666;">Copie o código PIX e pague no seu banco</p>
                <button class="btn-pagar" id="btnGerarPix" onclick="gerarPagamentoPIX()">
                    <i class="fas fa-qrcode"></i> Gerar PIX
                </button>
                <div id="pixDados" style="display:none;margin-top:16px;">
                    <div class="codigo-pix" onclick="copiarPIX()" id="pixCodigo">Carregando...</div>
                    <div id="pixCopiado" class="copiado">✅ Código copiado!</div>
                    <div id="qrContainer" style="margin-top:16px;"></div>
                </div>
            </div>
            <div id="cartaoArea" class="cartao-area">
                <p style="font-weight:bold;margin-bottom:12px;">💳 Pagamento com Cartão de Crédito</p>
                <p style="font-size:13px;color:#666;margin-bottom:16px;">Escolha o número de parcelas no próximo passo</p>
                <button class="btn-pagar" onclick="processarPagamentoCartao()">
                    <i class="fas fa-credit-card"></i> Pagar com Cartão
                </button>
            </div>
        `;
    }

    function selecionarMetodo(metodo) {
        var btns = document.querySelectorAll('.metodo-btn');
        btns.forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('.metodo-btn[data-metodo="' + metodo + '"]').classList.add('active');
        document.getElementById('pixArea').style.display = metodo === 'pix' ? 'block' : 'none';
        document.getElementById('cartaoArea').style.display = metodo === 'cartao' ? 'block' : 'none';
    }

    async function gerarPagamentoPIX() {
        var btn = document.getElementById('btnGerarPix');
        if (!btn) return;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Gerando...';

        try {
            var response = await fetch(API_URL + '/ofertas/' + ofertaId + '/gerar-pagamento?metodo=pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            var data = await response.json();

            if (data.sucesso) {
                btn.style.display = 'none';
                var pixDados = document.getElementById('pixDados');
                pixDados.style.display = 'block';
                document.getElementById('pixCodigo').textContent = data.pix_payload;

                var qrContainer = document.getElementById('qrContainer');
                qrContainer.innerHTML = '';
                
                if (data.pix_payload) {
                    var qrDiv = document.createElement('div');
                    qrDiv.className = 'qr-placeholder';
                    qrDiv.innerHTML = '<i class="fas fa-qrcode"></i><p style="margin-top:8px;font-size:13px;">QR Code gerado no e-mail</p><p style="font-size:12px;color:#666;word-break:break-all;">' + data.pix_payload.substring(0, 50) + '...</p>';
                    qrContainer.appendChild(qrDiv);
                }

                alert('✅ PIX gerado! Copie o código e pague no seu banco.');
            } else {
                alert('❌ Erro: ' + (data.mensagem || 'Tente novamente'));
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-qrcode"></i> Gerar PIX';
            }
        } catch (error) {
            alert('❌ Erro de conexão: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-qrcode"></i> Gerar PIX';
        }
    }

    function copiarPIX() {
        var texto = document.getElementById('pixCodigo').textContent;
        navigator.clipboard.writeText(texto).then(function() {
            var copiado = document.getElementById('pixCopiado');
            copiado.style.display = 'block';
            setTimeout(function() { copiado.style.display = 'none'; }, 3000);
        });
    }

    async function processarPagamentoCartao() {
        var totalElement = document.querySelector('.valores.total .value');
        var valorTexto = totalElement ? totalElement.textContent : '0';
        var valor = parseFloat(valorTexto.replace(/R\$\s*/g, '').replace(/\./g, '').replace(',', '.')) || 0;

        if (valor === 0) {
            alert('❌ Erro: Valor não encontrado.');
            return;
        }

        var opcoes = '';
        for (var i = 1; i <= 12; i++) {
            var valorParcela = (valor / i);
            opcoes += i + 'x de R$ ' + valorParcela.toFixed(2) + (i === 1 ? ' (sem juros)' : '') + '\n';
        }
        
        var parcelasInput = prompt('📊 PARCELAMENTO\n\n' + opcoes + '\nDigite o número de parcelas (1 a 12):', '1');
        if (!parcelasInput) return;
        var parcelas = Math.min(12, Math.max(1, parseInt(parcelasInput) || 1));
        
        var btn = document.querySelector('#cartaoArea .btn-pagar');
        if (!btn) return;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...';
        
        try {
            var response = await fetch(API_URL + '/ofertas/' + ofertaId + '/gerar-pagamento?metodo=cartao&parcelas=' + parcelas, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            var data = await response.json();
            
            if (data.sucesso && data.checkout_url) {
                alert('✅ Link de pagamento gerado!\n\n' +
                      '💰 Valor: R$ ' + data.valor.toFixed(2) + '\n' +
                      '📅 Parcelas: ' + data.parcelas + 'x de R$ ' + (data.valor / data.parcelas).toFixed(2) + '\n\n' +
                      '🔗 Abrindo link de pagamento...');
                window.open(data.checkout_url, '_blank');
            } else {
                alert('❌ Erro: ' + (data.mensagem || 'Tente novamente'));
            }
        } catch (error) {
            alert('❌ Erro de conexão: ' + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-credit-card"></i> Pagar com Cartão';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    carregarPagamento();
</script>
</body>
</html>
