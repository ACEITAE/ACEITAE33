<!DOCTYPE html>
<html>
<head>
    <title>ACEITAÊ - Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { padding: 30px; border: 1px solid #ccc; border-radius: 10px; width: 300px; }
        input, button { width: 100%; margin: 10px 0; padding: 8px; }
        button { background: #00C853; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
        <p><a href="cadastro.html">Cadastre-se</a></p>
        <p id="msg"></p>
    </div>

    <script>
        const API_URL = 'https://aceitae33-api.onrender.com';

        async function logar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msg = document.getElementById('msg');

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('usuario_id', data.usuario_id);
                    localStorage.setItem('usuario_nome', data.nome);
                    localStorage.setItem('usuario_tipo', data.tipo);
                    msg.style.color = 'green';
                    msg.innerText = 'Login realizado!';
                    setTimeout(() => {
                        window.location.href = data.tipo === 'vendedor' ? 'vendedor.html' : 'index.html';
                    }, 1000);
                } else {
                    msg.style.color = 'red';
                    msg.innerText = data.detail || 'Erro no login';
                }
            } catch (error) {
                msg.style.color = 'red';
                msg.innerText = 'Erro de conexão';
            }
        }
    </script>
</body>
</html>
