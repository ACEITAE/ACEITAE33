<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ACEITAÊ - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1A237E 0%, #00C853 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1A237E;
        }

        .logo h1 span {
            color: #00C853;
        }

        .logo p {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }

        h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #1A237E;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #00C853;
            box-shadow: 0 0 0 3px rgba(0,200,83,0.1);
        }

        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #00C853;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #00A844;
            transform: scale(1.02);
        }

        .link-cadastro {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .link-cadastro a {
            color: #00C853;
            text-decoration: none;
            font-weight: bold;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }

        .error {
            color: #c62828;
            margin-top: 12px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
            font-size: 13px;
        }

        .success {
            color: #2e7d32;
            margin-top: 12px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 13px;
        }

        .info {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>ACEIT<span>AÊ</span></h1>
        <p>Faça a oferta. Torça pelo ACEITAÊ!</p>
    </div>
    <h2>Acessar minha conta</h2>
    
    <div class="form-group">
        <label><i class="fas fa-envelope"></i> E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    
    <div class="form-group">
        <label><i class="fas fa-lock"></i> Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
    </div>
    
    <button onclick="logar()">Entrar</button>
    
    <div class="link-cadastro">
        Não tem uma conta? <a href="cadastro.html">Cadastre-se gratuitamente</a>
    </div>
    
    <div id="msg"></div>
    <div class="info">
        <i class="fas fa-shield-alt"></i> Ambiente seguro
    </div>
</div>

<!-- Font Awesome para ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    const API_URL = 'https://aceitae33-api.onrender.com';

    async function logar() {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const msgDiv = document.getElementById('msg');

        if (!email || !senha) {
            msgDiv.innerHTML = '<div class="error">⚠️ Preencha todos os campos!</div>';
            return;
        }

        // Desabilitar botão para evitar múltiplos cliques
        const btn = document.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Entrando...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const data = await response.json();

            if (response.ok) {
                // SALVAR TODOS OS DADOS DO USUÁRIO NO localStorage
                if (data.access_token) {
                    localStorage.setItem('access_token', data.access_token);
                }
                localStorage.setItem('usuario_id', data.usuario_id);
                localStorage.setItem('usuario_nome', data.nome);
                localStorage.setItem('usuario_tipo', data.tipo);
                localStorage.setItem('usuario_email', data.email);  // ← ESSENCIAL PARA ADMIN

                console.log('✅ Login realizado com sucesso!');
                console.log('ID:', localStorage.getItem('usuario_id'));
                console.log('Nome:', localStorage.getItem('usuario_nome'));
                console.log('Tipo:', localStorage.getItem('usuario_tipo'));
                console.log('Email:', localStorage.getItem('usuario_email'));

                msgDiv.innerHTML = '<div class="success">✅ Login realizado! Redirecionando...</div>';
                
                setTimeout(() => {
                    // Redireciona baseado no tipo do usuário
                    if (data.tipo === 'vendedor' || data.tipo === 'ambos') {
                        window.location.href = 'vendedor.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
            } else {
                msgDiv.innerHTML = `<div class="error">❌ ${data.detail || 'E-mail ou senha inválidos'}</div>`;
                btn.disabled = false;
                btn.innerHTML = 'Entrar';
            }
        } catch (error) {
            console.error('Erro de conexão:', error);
            msgDiv.innerHTML = '<div class="error">❌ Erro de conexão. Verifique sua internet.</div>';
            btn.disabled = false;
            btn.innerHTML = 'Entrar';
        }
    }

    // Permitir enviar com Enter
    document.getElementById('senha').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            logar();
        }
    });
    document.getElementById('email').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            logar();
        }
    });
</script>
</body>
</html>
