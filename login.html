<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEITAÊ - Login</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 350px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #00C853; color: white; border: none; cursor: pointer; }
        button:hover { background: #00A844; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="card">
    <h2>ACEITAÊ - Login</h2>
    <input type="email" id="email" placeholder="E-mail" autocomplete="email">
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
    <button onclick="logar()">Entrar</button>
    <p><a href="cadastro.html">Cadastre-se</a></p>
    <div id="msg"></div>
</div>

<script>
    const API_URL = 'https://aceitae33-api.onrender.com';

    async function logar() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const msgDiv = document.getElementById('msg');

        if (!email || !senha) {
            msgDiv.innerHTML = '<span class="error">Preencha todos os campos!</span>';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const data = await response.json();

            if (response.ok) {
                // SALVAR TOKEN E DADOS DO USUÁRIO
                if (data.access_token) {
                    localStorage.setItem('access_token', data.access_token);
                }
                localStorage.setItem('usuario_id', data.usuario_id);
                localStorage.setItem('usuario_nome', data.nome);
                localStorage.setItem('usuario_tipo', data.tipo);

                console.log('Token salvo:', localStorage.getItem('access_token'));
                console.log('Usuário ID:', localStorage.getItem('usuario_id'));
                console.log('Usuário Nome:', localStorage.getItem('usuario_nome'));

                msgDiv.innerHTML = '<span class="success">Login realizado! Redirecionando...</span>';
                
                setTimeout(() => {
                    if (data.tipo === 'vendedor') {
                        window.location.href = 'vendedor.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
            } else {
                msgDiv.innerHTML = `<span class="error">${data.detail || 'E-mail ou senha inválidos'}</span>`;
            }
        } catch (error) {
            console.error('Erro:', error);
            msgDiv.innerHTML = '<span class="error">Erro de conexão</span>';
        }
    }
</script>
</body>
</html>
